<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <title>Login</title>
  <style>
    :root {
      --bg-base: #0d1117;
      --bg-surface: #161b22;
      --bg-input: #0d1117;
      --border-subtle: #21262d;
      --border-normal: #30363d;
      --border-focus: #388bfd;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #484f58;
      --blue-dim: rgba(56, 139, 253, 0.10);
      --amber: #d29922;
      --amber-dim: rgba(210, 153, 34, 0.10);
      --amber-border: rgba(210, 153, 34, 0.22);
      --green: #3fb950;
      --green-dim: rgba(63, 185, 80, 0.08);
      --green-border: rgba(63, 185, 80, 0.22);
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --r-sm: 4px;
      --r-md: 7px;
      --r-lg: 10px;
      --shadow: 0 1px 2px rgba(0, 0, 0, .5), 0 2px 10px rgba(0, 0, 0, .4);
      --t-fast: 110ms ease;
      --t-med: 200ms ease;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 1ms !important;
        transition-duration: 1ms !important;
      }
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      min-height: 100vh;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font);
    }

    .page-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .login-title {
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -.02em;
      color: var(--text-primary);
      margin-bottom: 3px;
    }

    .login-subtitle {
      font-size: 12.5px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .demo-warning {
      font-size: 12px;
      line-height: 1.5;
      color: var(--amber);
      background: var(--amber-dim);
      border: 1px solid var(--amber-border);
      border-radius: var(--r-md);
      padding: 8px 11px;
      margin-bottom: 18px;
    }

    .field {
      margin-bottom: 18px;
    }

    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 5px;
      letter-spacing: .01em;
    }

    .field-input {
      display: block;
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border-normal);
      border-radius: var(--r-md);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 13.5px;
      padding: 9px 13px;
      outline: none;
      transition: border-color var(--t-fast), box-shadow var(--t-fast);
    }

    .field-input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--blue-dim);
    }

    .field-input[readonly] {
      color: var(--text-secondary);
      cursor: default;
    }

    .field-input::placeholder {
      color: var(--text-muted);
    }

    .password-field {
      position: relative;
    }

    .password-input {
      padding-right: 42px;
    }

    .visibility-button {
      position: absolute;
      right: 3px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: var(--r-sm);
      color: var(--text-muted);
      cursor: pointer;
      transition: color var(--t-fast), background var(--t-fast);
    }

    .visibility-button:hover {
      color: var(--text-secondary);
      background: rgba(255, 255, 255, .05);
    }

    .visibility-button:focus-visible {
      outline: 2px solid var(--border-focus);
      outline-offset: 1px;
      color: var(--text-secondary);
    }

    .visibility-button svg {
      width: 15px;
      height: 15px;
      display: block;
    }

    .visibility-button svg[hidden] {
      display: none;
    }

    .local-feedback {
      min-height: 36px;
      display: none;
      align-items: flex-start;
      font-size: 12px;
      line-height: 1.5;
      color: var(--green);
      background: var(--green-dim);
      border: 1px solid var(--green-border);
      border-radius: var(--r-md);
      padding: 8px 11px;
      margin: -4px 0 18px;
    }

    .local-feedback.show {
      display: flex;
      animation: feedback-in var(--t-med) ease forwards;
    }

    .sign-in-button {
      width: 100%;
      background: rgba(56, 139, 253, .1);
      border: 1px solid rgba(56, 139, 253, .16);
      border-radius: var(--r-md);
      color: rgba(56, 139, 253, .38);
      font-family: var(--font);
      font-size: 13.5px;
      font-weight: 500;
      padding: 10px;
      cursor: not-allowed;
      margin-bottom: 8px;
    }

    .submission-note {
      font-size: 11.5px;
      color: var(--text-muted);
      text-align: center;
    }

    @keyframes feedback-in {
      from {
        opacity: 0;
        transform: translateY(-3px);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }

    @media (max-width: 460px) {
      .page-shell {
        padding: 18px;
      }

      .login-card {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section class="login-card" aria-labelledby="login-title">
      <h1 class="login-title" id="login-title">Login</h1>
      <p class="login-subtitle">Private Local Cloud / Secure Drive</p>
      <p class="demo-warning">Demo input only. Do not enter a real password.</p>

      <form novalidate>
        <div class="field">
          <label class="field-label" for="email">Email address</label>
          <input
            class="field-input"
            id="email"
            name="email"
            type="email"
            value="allzy@example.de"
            autocomplete="off"
            readonly
          >
        </div>

        <div class="field">
          <label class="field-label" for="password">Password</label>
          <div class="password-field">
            <input
              class="field-input password-input"
              id="password"
              name="password"
              type="password"
              autocomplete="new-password"
              placeholder="Type a demo password..."
              aria-describedby="local-feedback"
            >
            <button
              class="visibility-button"
              id="visibility-toggle"
              type="button"
              aria-label="Show password"
              aria-controls="password"
            >
              <svg id="eye-off-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="2.5" y1="2.5" x2="13.5" y2="13.5"/>
                <path d="M6.7 4.3A7.4 7.4 0 018 4c4 0 6.5 4 6.5 4a12 12 0 01-1.8 2.5"/>
                <path d="M4.5 5.4A11.9 11.9 0 001.5 8S4 12 8 12a7.5 7.5 0 003.3-.8"/>
                <path d="M5.8 5.8a2.5 2.5 0 103.5 3.5"/>
              </svg>
              <svg id="eye-on-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
                <path d="M1.5 8S4 3.5 8 3.5 14.5 8 14.5 8 12 12.5 8 12.5 1.5 8 1.5 8z"/>
                <circle cx="8" cy="8" r="2.25"/>
              </svg>
            </button>
          </div>
        </div>

        <p class="local-feedback" id="local-feedback" role="status" aria-live="polite"></p>

        <button class="sign-in-button" type="submit" disabled>Sign in</button>
        <p class="submission-note">Form submission is disabled in this sandbox.</p>
      </form>
    </section>
  </main>

  <script>
    const form = document.querySelector("form");
    const passwordInput = document.getElementById("password");
    const visibilityToggle = document.getElementById("visibility-toggle");
    const localFeedback = document.getElementById("local-feedback");
    const eyeOffIcon = document.getElementById("eye-off-icon");
    const eyeOnIcon = document.getElementById("eye-on-icon");

    form.addEventListener("submit", (event) => {
      event.preventDefault();
    });

    visibilityToggle.addEventListener("click", () => {
      const nextType = passwordInput.type === "password" ? "text" : "password";
      passwordInput.type = nextType;

      const isVisible = nextType === "text";
      visibilityToggle.setAttribute("aria-label", isVisible ? "Hide password" : "Show password");
      eyeOffIcon.toggleAttribute("hidden", isVisible);
      eyeOnIcon.toggleAttribute("hidden", !isVisible);

      localFeedback.textContent = "Visibility toggle works correctly.";
      localFeedback.classList.add("show");
    });
  </script>
</body>
</html>
